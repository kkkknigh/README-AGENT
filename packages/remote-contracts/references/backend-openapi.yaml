      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nodes
              properties:
                nodes:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    required:
                      - label
                      - name
                    properties:
                      label:
                        type: string
                        description: 节点类型
                      name:
                        type: string
                        description: 节点名称
                      properties:
                        type: object
                        additionalProperties: true
                      parent_id:
                        type: string
                        format: uuid
                        nullable: true
      responses:
        '201':
          description: 批量创建结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        node_id:
                          type: string
                          format: uuid
                        name:
                          type: string
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        index:

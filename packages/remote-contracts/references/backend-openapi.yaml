  /library/batch-delete:
    post:
      tags:
        - Library
      summary: 批量删除论文
      security:
        - BearerAuth: []
      description: |
        批量从用户文献库中移除文献（上限 50 条）。
        Flask 路由: POST /library/batch-delete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pdf_ids
              properties:
                pdf_ids:
                  type: array
                  maxItems: 50
                  items:
                    type: string
                  description: 要删除的 PDF 文件 Hash 列表
      responses:
        '200':
          description: 批量删除结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    description: 成功删除数量
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        pdf_id:
                          type: string
                        error:
                          type: string
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /library/batch-tag:
    patch:
      tags:
        - Library
      summary: 批量标签管理
      security:
        - BearerAuth: []
      description: |
        批量对多篇文献执行添加/移除标签操作（上限 50 项）。
        Flask 路由: PATCH /library/batch-tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    required:
                      - pdf_id
                      - operations
                    properties:
                      pdf_id:
                        type: string
                      operations:
                        type: array
                        items:
                          type: object
                          required:
                            - op
                            - tags
                          properties:
                            op:
                              type: string
                              enum: [add, remove]
                            tags:
                              type: array
                              items:
                                type: string
      responses:
        '200':
          description: 批量标签操作结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        pdf_id:
                          type: string
                        added:
                          type: array
                          items:
                            type: string
                        removed:
                          type: array
                          items:
                            type: string
                        skipped:
                          type: array
                          items:
                            type: string
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        pdf_id:
                          type: string
                        error:
                          type: string
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

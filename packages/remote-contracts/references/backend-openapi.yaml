        - UserInfo
      summary: 获取用户事实层
      security:
        - BearerAuth: []
      description: 获取用户的静态偏好信息
      responses:
        '200':
          description: 用户事实层
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  facts:
                    $ref: '#/components/schemas/UserFacts'
    put:
      tags:
        - UserInfo
      summary: 更新用户事实层
      security:
        - BearerAuth: []
      description: |
        用户直接编辑事实层，Agent 无权修改。
        可以部分更新，只传需要修改的字段。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserFactsUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFactsUpdateResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /userinfo/summaries:
    get:
      tags:
        - UserInfo
      summary: 获取用户情景摘要列表
      security:
        - BearerAuth: []
      description: 获取用户的周期性摘要列表，按时间倒序排列
      parameters:
        - name: limit
          in: query
          required: false
          description: 返回数量限制
          schema:
            type: integer
            default: 10
            maximum: 50
        - name: offset
          in: query
          required: false
          description: 偏移量
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 情景摘要列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummaryListResponse'
  /userinfo/summaries/{summary_id}:
    get:
      tags:
        - UserInfo
      summary: 获取单个情景摘要
      security:
        - BearerAuth: []
      parameters:
        - name: summary_id
          in: path
          required: true
          description: 摘要 ID
          schema:
            type: string
      responses:
        '200':
          description: 情景摘要详情
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  summary:
                    $ref: '#/components/schemas/UserSummary'
        '404':
          description: 摘要不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - UserInfo
      summary: 更新情景摘要
      security:
        - BearerAuth: []
      description: |
        用户或 Agent 都可以修改情景摘要。
        用户可见可编辑，Agent 会在会话结束后异步生成/更新。
      parameters:
        - name: summary_id
          in: path
          required: true
          description: 摘要 ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSummaryUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummaryUpdateResponse'
        '404':
          description: 摘要不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - UserInfo
      summary: 删除情景摘要
      security:
        - BearerAuth: []
      parameters:
        - name: summary_id
          in: path
          required: true
          description: 摘要 ID
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          description: 摘要不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tasks:
    get:
      summary: 获取任务列表
      description: 获取当前用户的异步任务列表，支持按类型和状态过滤
      tags:
        - tasks
      security:
        - bearerAuth: []
      parameters:
        - name: task_type
          in: query
          description: 任务类型过滤
          required: false
          schema:
            type: string
            enum:
              - pdf_parse
              - paper_download
              - rag_vectorize
              - session_title_gen
              - proposal_execute
              - session_summary
              - weekly_report
        - name: status
          in: query
          description: 任务状态过滤
          required: false
          schema:
            type: string
            enum:
              - pending
              - running
              - completed
              - failed
              - cancelled
        - name: limit
          in: query
          description: 返回数量限制
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: 分页偏移量
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: 任务列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /tasks/{task_id}:
    get:
      summary: 查询任务状态
      description: 查询指定任务的详细状态信息
      tags:
        - tasks
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          description: 任务ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务状态详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Task not found
    delete:
      summary: 取消任务
      description: 取消正在运行或等待中的任务
      tags:
        - tasks
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          description: 任务ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务已取消
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Task cancelled successfully
                  task_id:
                    type: string
        '400':
          description: 任务无法取消（已完成或已失败）
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Cannot cancel completed task
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Task not found
  /tasks/stream:
    get:
      summary: 任务进度SSE流
      description: 订阅任务进度更新的SSE流，可选择订阅特定任务或所有任务
      tags:
        - tasks
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: query
          description: 可选：订阅特定任务的进度更新。不提供则订阅所有任务
          required: false
          schema:
            type: string
      responses:
        '200':
          description: SSE事件流
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE事件流，每个事件包含：
                  - event: task_progress
                  - data: TaskProgressEvent JSON对象

                  示例：
                  ```
                  event: task_progress
                  data: {"task_id":"abc123","task_type":"pdf_parse","status":"running","progress":45,"message":"正在解析第3页..."}

                  event: task_progress
                  data: {"task_id":"abc123","task_type":"pdf_parse","status":"completed","progress":100,"result":{"paper_id":"uuid-xxx"}}
                  ```
        '401':
          $ref: '#/components/responses/Unauthorized'
  /tasks/{task_id}/status:
    get:
      summary: 查询单个 Celery 任务状态
      tags:
        - tasks
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务状态查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  state:
                    type: string
                  progress:
                    type: object
                    nullable: true
                  result:
                    type: object
                    nullable: true
                  error:
                    type: string
                    nullable: true
  /batch/{batch_id}/status:
    get:
      summary: 查询批量任务聚合状态
      tags:
        - batch
      security:
        - BearerAuth: []
      parameters:
        - name: batch_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 批量任务状态查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_id:
                    type: string
                  batch_type:
                    type: string
                  summary:
                    type: object
                    properties:
                      total:
                        type: integer
                      pending:
                        type: integer
                      processing:
                        type: integer
                      completed:
                        type: integer
                      failed:
                        type: integer
                      pre_failed:
                        type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        task_id:
                          type: string
                        state:
                          type: string
                        progress:
                          type: object
                          nullable: true
                        result:
                          type: object
                          nullable: true
                        error:
                          type: string
                          nullable: true
                  created_at:
                    type: string
                    format: date-time
        '404':
          description: 批量任务不存在
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Access Token，通过 /api/auth/login 或 /api/auth/register 获取。
        在请求头中以 `Authorization: Bearer <token>` 方式携带。
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        code:
          type: string
          description: 机器可读的错误码，前端按此字段判断错误类型
          example: MISSING_FIELDS
        error:
          type: string
          description: 人类可读的错误信息，可直接展示给用户
          example: Invalid file type
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      description: |
        注册第 1 步：提交用户信息，服务端发送验证码到邮箱。
        若启用邀请码功能，inviteCode 为必填。
      properties:
        username:
          type: string
          minLength: 2
          maxLength: 30
          description: 用户名（字母、数字、中文、下划线、连字符）
          example: achyut
        email:
          type: string
          format: email
          description: 邮箱（不区分大小写）
          example: achyut@example.com
        password:
          type: string
          minLength: 8
          description: 密码，至少 8 位，须包含至少一个字母和一个数字
          example: pass1234
        inviteCode:
          type: string
          description: 邀请码（6 位 base32，启用邀请码功能时必填）
          example: A3BK7Q
    VerificationCodeSentResponse:
      type: object
      properties:
        message:
          type: string
          example: Verification code sent to your email
    VerifyRegisterRequest:
      type: object
      required:
        - email
        - code
      description: 注册第 2 步：提交邮箱验证码，完成注册
      properties:
        email:
          type: string
          format: email
          example: achyut@example.com
        code:
          type: string
          pattern: ^\d{6}$
          description: 6 位数字验证码
          example: '123456'
    UserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
    AuthResponse:
      type: object
      description: 注册/登录成功的统一响应
      properties:
        message:
          type: string
          example: Login successful
        user:
          $ref: '#/components/schemas/UserInfo'
        accessToken:
          type: string
          description: JWT Access Token
    ResendCodeRequest:
      type: object
      required:
        - email
      description: 重发验证码（注册/重置密码通用）
      properties:
        email:
          type: string
          format: email
          example: achyut@example.com
        purpose:
          type: string
          enum:
            - register
            - reset
          default: register
          description: 验证码用途
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: achyut@example.com
        password:
          type: string
    ForgotPasswordRequest:
      type: object
      required:
        - email
      description: 忘记密码第 1 步：发送验证码到邮箱
      properties:
        email:
          type: string
          format: email
          example: achyut@example.com
    SimpleMessageResponse:
      type: object
      properties:
        message:
          type: string
    ResetPasswordRequest:
      type: object
      required:
        - email
        - code
        - newPassword
      description: 忘记密码第 2 步：验证码 + 新密码
      properties:
        email:
          type: string
          format: email
          example: achyut@example.com
        code:
          type: string
          pattern: ^\d{6}$
          description: 6 位数字验证码
          example: '123456'
        newPassword:
          type: string
          minLength: 8
          description: 新密码，至少 8 位，须包含至少一个字母和一个数字
          example: newpass1234
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: Refresh Token（可选，由 HttpOnly Cookie 自动提供）
    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: 新的 Access Token
    MeResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            email:
              type: string
              format: email
            avatarUrl:
              type: string
              nullable: true
            bio:
              type: string
              nullable: true
            preferences:
              type: object
              additionalProperties: true
            createdAt:
              type: string
              format: date-time
    MeUpdateRequest:
      type: object
      properties:
        username:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        preferences:
          type: object
          additionalProperties: true
    PasswordChangeRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          description: 新密码，至少 8 位，须包含至少一个字母和一个数字
    PasswordChangeResponse:
      type: object
      description: 修改密码成功后返回新 Token
      properties:
        message:
          type: string
          example: Password changed successfully
        accessToken:
          type: string
          description: 新的 JWT Access Token
    StatsResponse:
      type: object
      properties:
        stats:
          type: object
          additionalProperties: true
    AccountDeleteRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
    LibraryItem:
      type: object
      description: 用户文献库中的单条文献信息
      required:
        - pdfId
        - title
        - tags
        - addedAt
        - fileSize
        - totalPages
        - processStatus
        - readStatus
      properties:
        pdfId:
          type: string
          description: PDF 文件 Hash，作为文献的唯一标识
        title:
          type: string
          description: 文献标题
          example: Attention Is All You Need
        tags:
          type: array
          description: 文献所属标签/分组列表
          items:
            type: string
          example:
            - NLP
            - Transformer
        addedAt:
          type: string
          format: date-time
          description: 文献加入当前用户文献库的时间
        fileSize:
          type: integer
          description: 文件大小（字节）
          example: 1234567
        totalPages:
          type: integer
          description: PDF 总页数
          example: 14
        processStatus:
          type: string
          description: |
            PDF 解析/预处理状态，对应后端 global_file.process_status。
            例如：pending / processing / completed / failed / unknown
          example: completed
        readStatus:
          type: string
          description: 文献阅读状态（如 unread / reading / done）
          example: unread
    LibraryListResponse:
      type: object
      description: 文献库列表响应
      required:
        - items
        - page
        - pageSize
      properties:
        items:
          type: array
          description: 当前页的文献列表
          items:
            $ref: '#/components/schemas/LibraryItem'
        page:
          type: integer
          description: 当前页码（从 1 开始）
          example: 1
        pageSize:
          type: integer
          description: 每页返回的文献数量
          example: 50
    UploadResponse:
      type: object
      properties:
        pdfId:
          type: string
          description: 文件Hash，作为PDF的全局唯一标识
        taskId:
          type: string
          description: Celery异步任务ID，用于轮询处理进度
        status:
          type: string
          description: 任务状态，包括pending, processing, completed, failed
        pageCount:
          type: integer
          description: PDF文件的页数
        filename:
          type: string
          description: 上传时的原始文件名
        isNewUpload:
          type: boolean
          description: 用file_hash查globalfile表，true 表示文件不存在，需要重新上传；false 表示文件已存在（秒传）
    ImportLinkRequest:
      type: object
      required:
        - input
      properties:
        input:
          type: string
          description: DOI、arXiv ID、直接 PDF 链接或论文落地页链接
          example: https://arxiv.org/abs/1706.03762
    ResolvedImportLink:
      type: object
      required:
        - source_type
        - normalized_input
      properties:
        source_type:
          type: string
          description: 识别出的来源类型
          enum:
            - doi
            - arxiv
            - pdf_url
            - biorxiv
            - medrxiv
            - osf_preprints
            - google_scholar
            - journal
        normalized_input:
          type: string
          description: 归一化后的核心输入
        landing_url:
          type: string
          nullable: true
          description: 解析过程中识别到的论文落地页
        pdf_url:
          type: string
          nullable: true
          description: 最终可下载的 PDF 链接
        title:
          type: string
          nullable: true
          description: 解析到的论文标题
        doi:
          type: string
          nullable: true
          description: 解析到的 DOI
        arxiv_id:
          type: string
          nullable: true
          description: 解析到的 arXiv ID
    ImportLinkResponse:
      allOf:
        - $ref: '#/components/schemas/UploadResponse'
        - type: object
          properties:
            resolved:
              $ref: '#/components/schemas/ResolvedImportLink'
    Paragraph:
      type: object
      description: 解析后的PDF段落对象，代码见parse_paragraphs函数
      required:
        - id
        - page
        - index
        - bbox
        - content
        - wordCount
      properties:
        id:
          type: string
          description: 段落ID段落唯一标识符 (格式：pdf_chk_{pdf_id前8位}_{页码}_{块号})
          example: pdf_chk_11451419_198_10
        page:
          type: integer
          description: 页数
          minimum: 1
        index:
          type: integer
          description: 当前页面的文本块索引(PyMuPDF block_no)
          minimum: 1
        bbox:
          type: array
          description: 段落在PDF页面中的坐标，[x0, y0, x1, y1]（单位：PDF points）
          items:
            type: number
            format: float
          example:
            - 100
            - 100
            - 200
            - 200
        content:
          type: string
          description: 清洗后的文本内容，如果文本块完全位于顶部或底部区域，视为噪音；忽略len<5的非实质性文本碎片
          example: This is a test paragraph.
        wordCount:
          type: integer
          description: 段落中单词数量
          minimum: 1
          example: 10
    ParagraphList:
      type: array
      description: 段落的列表
      items:
        $ref: '#/components/schemas/Paragraph'
    StatusResponse:
      type: object
      required:
        - status
        - currentPage
        - totalPages
        - error
        - paragraphs
      properties:
        status:
          type: string
          description: 任务状态，包括pending, processing, completed, failed
        currentPage:
          type: integer
          description: 当前处理到的页数
        totalPages:
          type: integer
          description: PDF文件的总页数
        error:
          type: string
          description: 错误信息
          example: Invalid file type
        paragraphs:
          $ref: '#/components/schemas/ParagraphList'
    Metadata:
      type: object
      description: PDF文件的元数据，依托史。这些字段由 fitz.Document.metadata（PyMuPDF）从 PDF 文件自身的元数据中提取。
      example:
        title: Attention Is All You Need
        author: Ashish Vaswani et al.
        subject: ''
        keywords: ''
        creator: LaTeX
        producer: pdfTeX-1.40.17
        creationDate: D:20170612...
        modDate: D:20170612...
        format: PDF 1.5
    Dimension:
      type: object
      description: PDF文件单页的尺寸
      required:
        - width
        - height
      properties:
        width:
          type: number
          format: float
        height:
          type: number
          format: float
    InfoResponse:
      type: object
      required:
        - id
        - pageCount
        - metadata
      properties:
        id:
          type: string
          description: PDF文件Hash
        pageCount:
          type: integer
          description: PDF文件的页数
        metadata:
          description: PDF文件的元数据,这些字段由 fitz.Document.metadata（PyMuPDF）从 PDF 文件自身的元数据中提取。
          $ref: '#/components/schemas/Metadata'
        dimensions:
          type: array
          description: PDF文件每页的尺寸
          items:
            $ref: '#/components/schemas/Dimension'
    LayoutOverlayItem:
      type: object
      required:
        - page
        - bboxNorm
      properties:
        page:
          type: integer
          description: 页数
          minimum: 1
        index:

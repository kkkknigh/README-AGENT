openapi: 3.0.0
info:
  title: README PDF Reader API
  description: README的OpenAPI文档
  version: 1.2.0
servers:
  - url: http://localhost:5000/api
    description: 本地开发环境
security:
  - BearerAuth: []
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: 注册第 1 步 — 发送验证码
      description: |
        验证用户信息后，向邮箱发送 6 位数字验证码。
        启用邀请码功能时 inviteCode 为必填。
        限流: 3 次/分钟。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 验证码已发送
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationCodeSentResponse'
        '400':
          description: |
            请求参数错误，code 可能的值：
            - `MISSING_BODY` — 请求体为空
            - `MISSING_FIELDS` — 缺少 username / email / password
            - `INVALID_USERNAME` — 用户名格式错误（2-30 字符，只允许字母/数字/中文/下划线/连字符）
            - `PASSWORD_TOO_SHORT` — 密码少于 8 位
            - `PASSWORD_WEAK` — 密码须包含至少一个字母和一个数字
            - `INVALID_EMAIL` — 邮箱格式错误
            - `EMAIL_EXISTS` — 邮箱已被注册
            - `MISSING_INVITE_CODE` — 邀请码为空（启用邀请码功能时）
            - `INVALID_INVITE_CODE` — 邀请码无效
            - `EMAIL_SEND_FAILED` — 验证码邮件发送失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: |
            - `CODE_COOLDOWN` — 请求过于频繁，请稍后重试
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/verify-register:
    post:
      tags:
        - Auth
      summary: 注册第 2 步 — 验证码校验并创建用户
      description: |
        提交邮箱验证码完成注册，成功后返回 accessToken，
        并通过 HttpOnly Cookie 写入 refreshToken。
        限流: 5 次/分钟。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRegisterRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          headers:
            Set-Cookie:
              description: 写入 refreshToken HttpOnly Cookie
              schema:
                type: string
        '400':
          description: |
            code 可能的值：
            - `MISSING_BODY` — 请求体为空
            - `MISSING_FIELDS` — 缺少 email / code
            - `EXPIRED_OR_NOT_FOUND` — 验证码已过期或未发起注册
            - `INVALID_CODE` — 验证码错误
            - `TOO_MANY_ATTEMPTS` — 尝试次数过多，请重新注册
            - `EMAIL_EXISTS` — 邮箱已被注册（并发场景）
            - `REGISTRATION_FAILED` — 注册失败，请重试
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/resend-code:
    post:
      tags:
        - Auth
      summary: 重发验证码
      description: |
        注册或重置密码时重新发送验证码。
        限流: 1 次/分钟。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendCodeRequest'
      responses:
        '200':
          description: 新验证码已发送
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationCodeSentResponse'
        '400':
          description: |
            code 可能的值：
            - `MISSING_BODY` — 请求体为空
            - `MISSING_FIELDS` — 缺少 email
            - `INVALID_PURPOSE` — purpose 必须是 register 或 reset
            - `NOT_FOUND` — 未找到待处理的请求
            - `EMAIL_SEND_FAILED` — 邮件发送失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: |
            - `CODE_COOLDOWN` — 请求过于频繁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: 用户登录
      description: '限流: 5 次/分钟。'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功，Cookie 中写入 refreshToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          headers:
            Set-Cookie:
              description: 写入 refreshToken HttpOnly Cookie
              schema:
                type: string
        '400':
          description: |
            请求参数错误，code 可能的值：
            - `MISSING_BODY` — 请求体为空
            - `MISSING_FIELDS` — 缺少 email / password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: |
            认证失败，code 的值：
            - `INVALID_CREDENTIALS` — 邮箱不存在或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: 忘记密码第 1 步 — 发送验证码
      description: |
        向邮箱发送密码重置验证码。
        无论邮箱是否存在均返回相同响应（防枚举攻击）。
        限流: 3 次/分钟。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: 若邮箱存在则发送验证码
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
        '400':
          description: |
            code 可能的值：
            - `MISSING_BODY` — 请求体为空
            - `MISSING_FIELDS` — 缺少 email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: 忘记密码第 2 步 — 验证码 + 新密码
      description: '限流: 5 次/分钟。'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: 密码重置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
        '400':
          description: |
            code 可能的值：
            - `MISSING_BODY` — 请求体为空
            - `MISSING_FIELDS` — 缺少 email / code / newPassword
            - `PASSWORD_TOO_SHORT` — 新密码少于 8 位
            - `PASSWORD_WEAK` — 新密码须包含字母和数字
            - `EXPIRED_OR_NOT_FOUND` — 验证码过期或未找到
            - `INVALID_CODE` — 验证码错误
            - `TOO_MANY_ATTEMPTS` — 尝试次数过多
            - `USER_NOT_FOUND` — 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: 刷新 Access Token
      security: []
      description: |
        使用 Refresh Token 换取新的 Access Token；默认依赖后端写入的 HttpOnly Cookie 自动携带。
        限流: 30 次/分钟。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 返回新的 Access Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '400':
          description: |
            请求参数错误，code 的值：
            - `MISSING_TOKEN` — 缺少 refreshToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: |
            Refresh Token 无效，code 可能的值：
            - `INVALID_REFRESH_TOKEN` — Token 无效或已过期
            - `USER_NOT_FOUND` — 用户已被删除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: 用户登出
      description: 清除 refreshToken Cookie。JWT 可选（已登录或未登录均可调用）。
      security:
        - BearerAuth: []
        - {}
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
          headers:
            Set-Cookie:
              description: 清除 refreshToken Cookie
              schema:
                type: string
  /auth/me:
    get:
      tags:
        - Auth
      summary: 获取当前用户信息
      security:
        - BearerAuth: []
      description: 需要有效的 Access Token。返回用户基础资料（含头像、简介、偏好设置）。
      responses:
        '200':
          description: 用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: 未登录或 Token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            code 的值：
            - `USER_NOT_FOUND` — 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Auth
      summary: 更新当前用户资料
      security:
        - BearerAuth: []
      description: 可更新 username、bio、avatarUrl、preferences，均为可选字段。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '400':
          description: 请求体缺失或参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/password:
    put:
      tags:
        - Auth
      summary: 修改当前用户密码
      description: |
        修改成功后签发新 Token，旧 Token 在前端被替换。Cookie 中更新 refreshToken。
        限流: 5 次/分钟。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '200':
          description: 修改成功，返回新 accessToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordChangeResponse'
          headers:
            Set-Cookie:
              description: 更新 refreshToken Cookie
              schema:
                type: string
        '400':
          description: |
            code 可能的值：
            - `MISSING_BODY` — 请求体为空
            - `MISSING_FIELDS` — 缺少 oldPassword / newPassword
            - `PASSWORD_TOO_SHORT` — 新密码少于 8 位
            - `PASSWORD_WEAK` — 新密码须包含字母和数字
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 当前密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/stats:
    get:
      tags:
        - Auth
      summary: 获取当前用户统计信息
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 用户统计信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/account:
    delete:
      tags:
        - Auth
      summary: 删除当前用户账号
      description: '删除成功后清除 refreshToken Cookie。限流: 3 次/分钟。'
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountDeleteRequest'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
          headers:
            Set-Cookie:
              description: 清除 refreshToken Cookie
              schema:
                type: string
        '400':
          description: 缺少密码
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /upload/upload:
    post:
      tags:
        - PDF
      summary: 上传PDF文件
      security:
        - BearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 仅支持上传PDF文件
              required:
                - file
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: 请求参数错误 (文件缺失、文件名为空或格式非 PDF)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /upload/import-link:
    post:
      tags:
        - PDF
      summary: 通过链接导入文献
      security:
        - BearerAuth: []
      description: 支持 DOI、arXiv、直接 PDF 链接，以及常见论文落地页。后端会解析输入、下载 PDF，并复用现有文献导入链路。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportLinkRequest'
      responses:
        '200':
          description: 导入成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportLinkResponse'
        '400':
          description: 输入为空、链接不安全或无法解析出 PDF
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /upload/{pdf_id}/status:
    get:
      tags:
        - PDF
      summary: 获取PDF处理状态
      security:
        - BearerAuth: []
      description: 获取PDF处理状态，包括任务状态、处理进度等。目前前端代码还没用这个接口，还没加异步轮询。
      parameters:
        - name: pdf_id
          in: path
          required: true
          description: PDF文件Hash
          schema:
            type: string
        - name: from_page
          in: query
          required: false
          description: 从第几页开始返回段落，默认从第一页开始
          schema:
            type: integer
            default: 1
            example: 1
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /paper/{pdf_id}/content:
    get:
      tags:
        - PDF
      summary: 获取PDF段落
      security:
        - BearerAuth: []
      description: 使用场景：在pdf某页前端的段落翻译需要所有的id，bbox和content
      parameters:
        - name: pdf_id
          in: path
          required: true
          description: PDF文件Hash
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 指定页码，不传则返回全部页
          schema:
            type: integer
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParagraphList'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /paper/{pdf_id}/layout:
    get:
      tags:
        - PDF
      summary: 获取 PDF 布局覆盖层
      security:
        - BearerAuth: []
      description: 获取前端用于显示图片、表格、公式框的归一化布局数据
      parameters:
        - name: pdf_id
          in: path
          required: true
          description: PDF文件Hash
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LayoutResponse'
        '404':
          description: PDF不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /paper/{pdf_id}/overlay/explain:
    post:
      tags:
        - PDF
      summary: Explain a PDF overlay region
      security:
        - BearerAuth: []
      description: Crop the selected overlay region from the PDF page and generate an explanation with nearby paragraph context.
      parameters:
        - name: pdf_id
          in: path
          required: true
          description: PDF file hash
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExplainOverlayRequest'
      responses:
        '200':
          description: Explanation generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplainOverlayResponse'
        '400':
          description: Invalid page, kind, or bboxNorm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: PDF not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Image analysis failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /paper/{pdf_id}/overlay/chat:
    post:
      tags:
        - PDF
      summary: Chat about a PDF overlay region
      security:
        - BearerAuth: []
      description: Crop the selected overlay region, attach nearby paragraph context, and run a focused multimodal follow-up chat for this region.
      parameters:
        - name: pdf_id
          in: path
          required: true
          description: PDF file hash
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OverlayChatRequest'
      responses:
        '200':
          description: Overlay chat response generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverlayChatResponse'
        '400':
          description: Invalid page, kind, bboxNorm, or message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: PDF not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /paper/{pdf_id}/image/{image_index}:
    get:
      tags:
        - PDF
      summary: 获取指定图片数据
      security:
        - BearerAuth: []
      parameters:
        - name: pdf_id
          in: path
          required: true
          description: PDF 文件 Hash
          schema:
            type: string
        - name: image_index
          in: path
          required: true
          description: 图片索引
          schema:
            type: integer
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdfImageResponse'
        '404':
          description: 图片不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /library/:
    get:
      tags:
        - Library
      summary: 获取当前用户的文献库列表
      security:
        - BearerAuth: []
      description: |
        Flask 路由: GET /library/
        返回当前登录用户文献库中的文献列表，支持分页、按分组筛选以及标题关键字搜索。
      parameters:
        - name: page
          in: query
          required: false
          description: 页码（从 1 开始）
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          description: 每页返回的文献数量
          schema:
            type: integer
            default: 50
        - name: group
          in: query
          required: false
          description: 按标签/分组筛选，不传则不过滤
          schema:
            type: string
        - name: keyword
          in: query
          required: false
          description: 按标题模糊搜索关键字
          schema:
            type: string
      responses:
        '200':
          description: 文献库列表
          content:
            application/json:
              schema:

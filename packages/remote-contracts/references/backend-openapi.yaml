            任务状态：
            - pending: 等待执行
            - running: 执行中
            - success: 成功
            - failed: 失败
            - revoked: 已撤销
        progress:
          type: object
          description: 任务进度信息
          properties:
            current:
              type: integer
              description: 当前进度
            total:
              type: integer
              description: 总进度
            percentage:
              type: number
              format: float
              description: 进度百分比
            message:
              type: string
              description: 进度描述
        result:
          type: object
          description: 任务结果（成功时）
        error:
          type: string
          description: 错误信息（失败时）
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - task_id
        - task_type
        - status
    TaskListResponse:
      type: object
      properties:
        success:
          type: boolean
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskStatus'
        total:
          type: integer
    PdfParseTaskStatus:
      allOf:
        - $ref: '#/components/schemas/TaskStatus'
        - type: object
          properties:
            parse_status:
              type: string
              enum:
                - pending
                - mineru_parsing
                - pymupdf_parsing
                - mineru_parsed
                - pymupdf_parsed
                - rag_processing
                - mineru_completed
                - pymupdf_completed
                - parse_failed
                - rag_failed
              description: |
                PDF 解析详细状态：
                - pending: 等待解析
                - mineru_parsing: MinerU 解析中
                - pymupdf_parsing: PyMuPDF 解析中（回退）
                - mineru_parsed: MinerU 解析完成
                - pymupdf_parsed: PyMuPDF 解析完成
                - rag_processing: RAG 向量化中
                - mineru_completed: 完全完成（MinerU）
                - pymupdf_completed: 完全完成（PyMuPDF）
                - parse_failed: 解析失败
                - rag_failed: RAG 失败
            paper_id:
              type: string
              description: 论文 ID
            file_hash:
              type: string
              description: 文件 Hash
            page_count:
              type: integer
              description: 总页数
            parsed_pages:
              type: integer
              description: 已解析页数
    PaperDownloadTaskStatus:
      allOf:
        - $ref: '#/components/schemas/TaskStatus'
        - type: object
          properties:
            paper_id:
              type: string
              format: uuid
              description: 论文 ID
            download_status:
              type: string
              enum:
                - pending
                - downloading
                - downloaded
                - parse_queued
                - completed
                - failed
              description: |
                下载状态：
                - pending: 等待下载
                - downloading: 下载中
                - downloaded: 下载完成
                - parse_queued: 已加入解析队列
                - completed: 完全完成（下载+解析）
                - failed: 下载失败
            download_url:
              type: string
              description: 下载 URL
            file_size:
              type: integer
              description: 文件大小（字节）
            downloaded_bytes:
              type: integer
              description: 已下载字节数
    TaskStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        task:
          oneOf:
            - $ref: '#/components/schemas/TaskStatus'
            - $ref: '#/components/schemas/PdfParseTaskStatus'
            - $ref: '#/components/schemas/PaperDownloadTaskStatus'
  responses:
    Unauthorized:
      description: 未认证或 token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Proposal:
      type: object
      description: Agent 提出的修改提案，需要用户审批
      properties:
        id:
          type: string
          format: uuid
          description: Proposal ID
        session_id:
          type: string
          description: 关联的聊天会话 ID
        action_type:
          type: string
          description: |
            操作类型（对应 Agent 工具名）：
            - manage_kg_node: 知识图谱节点操作（创建/删除/重命名/移动）
            - manage_kg_edge: 知识图谱边操作（创建/删除/更新）
            - tag: 标签操作（添加/移除）
            - manage_notes: 笔记操作（创建/更新/删除）
        title:
          type: string
          description: 操作的简短描述
          example: 删除节点 'Transformer'
        description:
          type: string
          description: 操作的详细说明
        action_params:
          type: object
          description: 操作参数，与对应工具的参数一致
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
            - expired
            - executed
            - failed
          description: |
            提案状态：
            - pending: 等待审批
            - approved: 已批准
            - rejected: 已拒绝
            - expired: 已过期（24小时未处理）
            - executed: 已执行
            - failed: 执行失败
        review_comment:
          type: string
          description: 审批意见
        execution_result:
          type: object
          description: 执行结果
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          description: 过期时间（创建后 24 小时）
        reviewed_at:
          type: string
          format: date-time
        executed_at:
          type: string
          format: date-time
      required:
        - id
        - action_type
        - title
        - action_params
        - status
    ProposalListResponse:
      type: object
      properties:
        proposals:
          type: array
          items:
            $ref: '#/components/schemas/Proposal'
        total:
          type: integer

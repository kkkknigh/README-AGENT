            - reject
          description: |
            操作类型：
            - approve: 批准（异步执行，立即返回审批结果）
            - reject: 拒绝
        comment:
          type: string
          description: 操作原因（可选，拒绝时建议填写）
      required:
        - action
    ProposalActionResponse:
      type: object

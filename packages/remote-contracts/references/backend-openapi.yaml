    UserReport:
      type: object
      description: |
        周报采用"每日增量追加"策略：每天生成当日摘要并 append 到本周唯一的 report 记录中。
        summary 字段为 Markdown 格式，按日期分节（## 周一 (3/24)、## 周二 (3/25) ...）。
      properties:
        id:
          type: string
          format: uuid
        report_type:
          type: string
          description: 报告类型，固定为 weekly
          example: weekly
        summary:
          type: string
          description: |
            报告内容（Markdown），按天分节追加。示例：
            ## 周一 (3/24)
            - 阅读了 Attention Is All You Need
            ## 周二 (3/25)
            - 讨论了 LoRA 微调方法
        period_start:
          type: string
          format: date-time
          description: 本周一 00:00:00 UTC
        period_end:
          type: string
          format: date-time
          description: 本周日 23:59:59 UTC
        generated_at:
          type: string
          format: date-time
          description: 最近一次追加的时间
    ReportResponse:
      type: object
      properties:
        report:
          $ref: '#/components/schemas/UserReport'
          nullable: true
    GenerateReportRequest:
      type: object
      description: |
        触发每日记忆管理，若已处理则跳过。包含两个独立异步任务：
        1. Fact 管理：从昨日用户消息（仅 role=user）中提取事实，执行 CRUD
        2. 日报生成：LLM 总结昨日用户消息，追加到本周周报

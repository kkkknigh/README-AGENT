        获取某轮 Agent 运行的细粒度中间事件。DB 中存储原始 LLM 输出，
        本接口在返回前清洗为结构化数据（拆分 thinking / tool_calls / text）。
        用于前端刷新后恢复历史思考过程展示。
      parameters:
        - name: session_id
          in: path
          required: true
          description: 会话 UUID
          schema:
            type: string
            format: uuid
        - name: messageId
          in: query
          required: true
          description: 触发 Agent 运行的用户消息 ID
          schema:
            type: integer
      responses:
        '200':
          description: 事件列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  sessionId:
                    type: string
                  messageId:
                    type: integer
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        seq:
                          type: integer
                        content:
                          type: object
                          description: 清洗后的结构化数据（DB 存储原始 LLM 输出，API 返回前清洗）
                          properties:
                            thinking:
                              type: array
                              items:
                                type: string
                              description: Agent 中间推理过程
                            tool_calls:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                  args:
                                    type: object
                              description: 本轮调用的工具列表
                            text:
                              type: string
                              description: 清洗后的可见文本（去除 thinking/tool_call 块后的剩余内容）
                        created_at:
                          type: string
                          format: date-time
                  total:
                    type: integer
        '400':
          description: 缺少 messageId 参数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    MessageAttachment:
      type: object
      description: 消息附件（对应 chat_attachments 表）
      properties:
        id:
          type: integer
        category:
          type: string
          description: '附件类别: image, file, citation, note'
          enum:
            - image
            - file
            - citation
            - note
        file_path:
          type: string
          description: 存储路径（针对 image/file，仅后端使用）
        data:
          type: object
          description: |
            附件数据，根据 category 不同而不同：
            - image: {base64: string, mime_type: string} - base64 编码的图片数据，前端可直接渲染
            - file: {filename: string, size: number, mime_type: string, download_url: string} - 文件元数据
            - citation: {paper_id: string, paragraph_id: string, text: string} - 引用的段落信息
            - note: {note_id: string, content: string} - 笔记内容
    Message:

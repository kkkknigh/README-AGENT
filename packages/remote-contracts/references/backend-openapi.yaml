  /translate/full_page:
    post:
      tags:
        - Translate
      summary: Full-page streaming translation
      security:
        - BearerAuth: []
      description: |
        Frontend sends the paragraphs for one page.
        Backend first returns cached translations for that page, then streams newly generated paragraph translations.
        Response format is text/event-stream with history / translation events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullPageTranslateRequest'
      responses:
        '200':
          description: Streaming translation response (SSE)
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"type":"history","translations":[]}

                  data: {"type":"translation","paragraphId":"pdf_chk_xxx_1_0","translation":"sample translation"}

                  data: [DONE]
        '400':
          description: Missing pdfId or paragraphs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

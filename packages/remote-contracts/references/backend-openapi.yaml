    UploadedAttachment:
      type: object
      description: 预上传的附件信息
      properties:
        id:
          type: string
          description: 附件临时 ID
          example: att_1234567890
        category:
          type: string
          enum:
            - image
            - file
          description: 附件类型
        file_path:
          type: string
          description: 临时存储路径（COS key）
          example: temp/attachments/user_123/att_1234567890.png
        metadata:
          type: object
          description: 附件元数据
          properties:
            filename:
              type: string
              description: 原始文件名
            size:
              type: integer
              description: 文件大小（字节）
            mime_type:
              type: string
              description: MIME 类型
            width:
              type: integer
              description: 图片宽度（仅图片）
            height:
              type: integer
              description: 图片高度（仅图片）
      required:
        - id
        - category
        - file_path
        - metadata
    AttachmentUploadResponse:
      type: object
      description: 附件预上传响应
      properties:
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/UploadedAttachment'
      required:
        - attachments
    NewSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
          description: 新生成的会话ID（此时尚未写库，懒创建）
        title:
          type: string
          example: 新对话
        isNew:
          type: boolean
          example: true
        messageCount:
          type: integer
          example: 0
    AttachmentReference:
      type: object
      description: 消息中的附件引用
      discriminator:
        propertyName: category
      required:
        - category
      properties:
        category:
          type: string
          enum:
            - image
            - file
            - citation
            - note
          description: 附件类别
    UploadedAttachmentReference:
      allOf:
        - $ref: '#/components/schemas/AttachmentReference'
        - type: object
          description: 引用预上传的附件（image/file）
          required:
            - attachment_id
          properties:
            attachment_id:
              type: string
              description: 预上传的附件 ID
              example: att_1234567890
    CitationAttachmentReference:
      allOf:
        - $ref: '#/components/schemas/AttachmentReference'
        - type: object
          description: 引用文献库中的段落
          required:
            - data
          properties:
            data:
              type: object
              required:
                - paper_id
                - paragraph_id
              properties:
                paper_id:
                  type: string
                  description: 论文 ID
                paragraph_id:
                  type: string
                  description: 段落 ID
                text:
                  type: string
                  description: 引用的段落文本
    NoteAttachmentReference:
      allOf:
        - $ref: '#/components/schemas/AttachmentReference'
        - type: object
          description: 引用用户笔记
          required:
            - data
          properties:
            data:
              type: object
              required:
                - note_id
              properties:
                note_id:
                  type: string
                  description: 笔记 ID
                content:
                  type: string
                  description: 笔记内容片段
    MessageRequest:
      type: object
      required:
        - message
        - sessionId
      properties:
        message:
          type: string
          description: 用户消息内容
          example: 你好，我是小智，有什么可以帮你的吗？
        sessionId:
          type: string
          format: uuid
          description: 会话ID
          example: 123e4567-e89b-12d3-a456-426614174000
        pdfId:
          type: string
          description: 可选。关联的PDF文件Hash。如果不传，会从请求头 X-Paper-Id 中读取。
        model:
          type: string
          description: 指定使用的模型（覆盖全局配置）
          example: gpt-4
        apiKey:
          type: string
          description: 指定使用的 API Key（覆盖全局配置）
        apiBase:
          type: string
          description: 指定使用的 API Base URL（覆盖全局配置）
        history:
          type: array
          description: 可选，前端传入的历史覆盖（用于重发/编辑场景）。提供时跳过数据库历史查询。
          items:
            type: object
            required:
              - role
              - content
            properties:
              role:
                type: string
                enum:
                  - user
                  - assistant
              content:
                type: string
        pruneFromId:
          description: 可选，指定从哪条消息开始裁剪并重发。
          oneOf:
            - type: integer
            - type: string
        images:
          type: array
          description: |
            可选，用户粘贴的图片（base64 编码，不含 data:image 前缀）。
            后端处理策略：
            - chat 模式：先将 base64 图片发送给 VLM 提取补充信息，若失败则 fallback 到 OCR
            - agent 模式：先将 base64 图片发送给 VLM 提取补充信息，若失败则 fallback 到 OCR
            图片同时作为 ChatAttachment (category=image) 持久化到数据库。
            最多处理 5 张。
          items:
            type: string
            format: byte
        attachments:
          type: array
          description: |
            可选，消息附件引用列表。
            - 外部文件（image/file）：需要先通过 /chatbox/attachments/upload 预上传，然后引用 attachment_id
            - 文献库内容（citation/note）：直接嵌入相关信息（类型+位置）
          items:
            oneOf:
              - $ref: '#/components/schemas/UploadedAttachmentReference'
              - $ref: '#/components/schemas/CitationAttachmentReference'
              - $ref: '#/components/schemas/NoteAttachmentReference'
    Citation:
      type: object
      description: RAG 检索引用源
      properties:
        source_type:
          type: string
          description: 引用类型
          enum:
            - vector
            - graph
        id:
          type: string
          description: 引用源ID
        text:
          type: string
          description: 引用文本片段
        score:
          type: number
          format: float
          description: 相似度分数
        name:
          type: string
          description: 实体名称 (graph 类型)
    StreamEvent:
      type: object
      description: SSE 流式事件，type 决定数据结构
      properties:
        type:
          type: string
          enum:
            - step
            - thinking
            - chunk
            - final
            - aborted
            - error
          description: |
            step: 中间步骤进度;
            thinking: Agent 中间推理过程;
            chunk: 增量文本;
            final: 最终结果;
            aborted: 用户中止 Agent 运行;
            error: 错误
        sessionId:
          type: string
          format: uuid
          description: 当前会话 ID
        step:
          type: string
          description: 当前步骤描述 (type=step)
          example: 检索相关信息
        text:
          type: string
          description: 中间推理文本 (type=thinking)
        delta:
          type: string
          description: 增量文本 (type=chunk)
          example: 这是新生成的一段文本
        response:
          type: string
          description: 最终回答 (type=final)
        citations:
          type: array
          description: 引用列表 (type=final)
          items:
            $ref: '#/components/schemas/Citation'
        steps:
          type: array
          description: 全部执行步骤 (type=final 或 type=aborted)
          items:
            type: string
        partial_response:
          type: string
          description: 被打断前已生成的部分回答 (type=aborted)，可能为 null
          nullable: true
        context_used:
          type: object
          description: 上下文使用信息 (type=final)
        error:
          type: string
          description: 错误信息 (type=error)
          example: 检索相关信息失败
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pdfId:
          type: string
          description: 关联的PDF文件Hash
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SessionListResponse:
      type: object
      properties:

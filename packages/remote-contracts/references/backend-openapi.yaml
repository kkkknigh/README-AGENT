  /chatbox/abort:
    post:
      tags:
        - Chat
      summary: 中止正在运行的 Agent
      security:
        - BearerAuth: []
      description: |
        通过 Redis 发送 abort 信号，通知正在运行的 Agent SSE 流终止。
        前端在用户点击「停止」按钮时调用。正在运行的流会在下一个 node 产出后
        检测到信号并发送 `aborted` 事件终止。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
              properties:
                sessionId:
                  type: string
                  format: uuid
                  description: 要中止的会话 ID
      responses:
        '200':
          description: Abort 信号已发送
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  sessionId:
                    type: string
                  message:
                    type: string
        '400':
          description: 缺少 sessionId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

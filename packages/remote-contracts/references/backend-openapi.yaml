  /profile/reports/generate:
    post:
      tags:
        - Profile
      summary: 触发每日记忆管理（异步）
      description: |
        每天首次 Agent 模式对话时自动触发，若昨日已处理则跳过。包含两个独立的异步任务：
        1. **Fact 管理**（MemR1）：拉取昨日所有 session 的用户消息（仅 role=user），
           一次性交给 LLM 做 fact CRUD（create/update/delete）
        2. **日报生成**：LLM 总结昨日用户消息，生成日摘要追加到本周周报
        也可通过此接口手动触发。
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateReportRequest'
      responses:
        '202':
          description: 已接受，异步处理中
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 每日记忆管理任务已提交（fact 管理 + 日报生成）
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
